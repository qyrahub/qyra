# Triggered when a tag matching v* is pushed (e.g. v0.1.4, v0.2.0).
# Builds wheel + sdist, publishes to PyPI via OIDC trusted publishing,
# then creates a GitHub Release with the artifacts attached.
#
# Setup: PyPI trusted publisher must be configured at
# https://pypi.org/manage/account/publishing/ before the first run.
# See HANDOVER for setup steps.
name: Publish

on:
  push:
    tags:
      - "v*"

# Don't cancel in-flight publishes if another tag lands.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build wheel + sdist
        run: python -m build
      - name: Validate distribution metadata
        run: twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Named environment matches what you'll register in PyPI's trusted publisher form.
    environment:
      name: pypi
      url: https://pypi.org/p/qyra
    # OIDC token write permission — required for trusted publishing.
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with: password:` — trusted publishing handles auth via OIDC.

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
